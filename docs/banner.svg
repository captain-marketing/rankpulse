  <text x="640" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#64748b" text-anchor="middle">Real-time <tspan font-weight="600" fill="#94a3b8">SEO data layer</tspan> for Claude Code</text>
  <text x="640" y="224" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#475569" text-anchor="middle">Powered by DataForSEO · Google Search Console · GA4</text>

  <!-- Pills -->
  <!-- SERP Analysis -->
  <rect x="222" y="258" width="136" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="242" cy="274" r="4" fill="#22c55e"/>
  <text x="254" y="279" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" font-weight="500">SERP Analysis</text>

