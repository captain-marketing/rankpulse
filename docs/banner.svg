  <!-- Technical Audit -->
  <rect x="542" y="258" width="148" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="562" cy="274" r="4" fill="#22c55e"/>
  <text x="574" y="279" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" font-weight="500">Technical Audit</text>

  <!-- AEO -->
  <rect x="702" y="258" width="72" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="722" cy="274" r="4" fill="#22c55e"/>
  <text x="734" y="279" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" font-weight="500">AEO</text>

  <!-- Position Dashboard -->
  <rect x="786" y="258" width="178" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="806" cy="274" r="4" fill="#22c55e"/>
  <text x="818" y="279" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" font-weight="500">Position Dashboard</text>

  <!-- MIT License -->
  <rect x="976" y="258" width="96" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="996" cy="274" r="4" fill="#64748b"/>
  <text x="1008" y="279" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569" font-weight="500">MIT License</text>

  <!-- Bottom URL -->
  <text x="640" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle" letter-spacing="0.5">github.com/captain-marketing/rankpulse</text>
